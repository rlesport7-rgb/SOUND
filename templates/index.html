<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>VoiceMod Pro</title>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    :root {
      --bg: #0a0a14;
      --surface: rgba(25, 22, 48, 0.85);
      --accent: #00e5ff;
      --accent2: #d500f9;
      --danger: #ff5252;
      --text: #f0f0ff;
      --text-secondary: #b0b0d0;
      --border-glass: rgba(255,255,255,0.08);
      --radius: 18px;
      --gap: 10px;
    }
    * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', system-ui, sans-serif;
      height: 100vh; height: 100dvh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      position: relative;
      user-select: none;
    }
    .stars {
      position: fixed; top:0; left:0; width:100%; height:100%;
      pointer-events:none; z-index:0;
      background: radial-gradient(ellipse at 30% 20%, rgba(213,0,249,0.07) 0%, transparent 50%),
                  radial-gradient(ellipse at 80% 80%, rgba(0,229,255,0.05) 0%, transparent 50%);
    }
    .star {
      position: absolute; background: white; border-radius: 50%;
      animation: twinkle 4s infinite alternate; opacity:0;
    }
    @keyframes twinkle {
      0% { opacity:0.1; transform:scale(0.5); }
      100% { opacity:0.8; transform:scale(1); }
    }

    .app { position: relative; z-index:1; display: flex; flex-direction: column; height: 100%; }
    .header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 16px; background: var(--surface);
      backdrop-filter: blur(20px); border-bottom: 1px solid var(--border-glass);
      flex-shrink:0;
    }
    .logo {
      font-size: 1.3rem; font-weight: 700;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      display: flex; align-items: center; gap: 6px;
    }
    .logo i { width:22px; height:22px; stroke-width:2.5; }
    .header-btns { display:flex; gap:8px; }
    .icon-btn {
      width:38px; height:38px; border-radius:50%;
      background:rgba(255,255,255,0.06); border:1px solid var(--border-glass);
      color:var(--accent); display:flex; align-items:center; justify-content:center;
      cursor:pointer; transition:0.2s;
    }
    .icon-btn.active { background:var(--accent); color:#000; border-color:var(--accent); }
    .icon-btn svg { width:18px; height:18px; stroke-width:2; }

    .tab-bar {
      display:flex; justify-content:center; gap:8px;
      padding:8px 16px; background:rgba(0,0,0,0.3); flex-shrink:0;
    }
    .tab-btn {
      flex:1; padding:10px 0; border-radius:30px;
      background:rgba(255,255,255,0.06); border:1px solid var(--border-glass);
      color:var(--text-secondary); font-weight:600; font-size:0.9rem;
      text-align:center; cursor:pointer; transition:0.2s;
    }
    .tab-btn.active {
      background:var(--accent); color:#000; border-color:var(--accent);
      box-shadow:0 0 15px rgba(0,229,255,0.4);
    }

    .search-wrap { padding:10px 16px; background:rgba(0,0,0,0.3); flex-shrink:0; }
    .search-input {
      width:100%; padding:12px 16px; border-radius:30px;
      border:1px solid var(--border-glass); background:rgba(255,255,255,0.06);
      color:var(--text); font-size:0.9rem; outline:none; transition:0.2s;
    }
    .search-input:focus { border-color:var(--accent); box-shadow:0 0 15px rgba(0,229,255,0.2); }

    .controls {
      display:flex; align-items:center; gap:8px;
      padding:10px 16px; background:rgba(10,9,28,0.5); flex-shrink:0;
    }
    .vol-icon { color:var(--accent2); }
    .vol-slider {
      flex:1; accent-color:var(--accent2); height:4px;
      background:rgba(255,255,255,0.15); border-radius:4px;
    }
    .vol-slider::-webkit-slider-thumb {
      width:18px; height:18px; background:var(--accent2);
      border-radius:50%; box-shadow:0 0 10px var(--accent2);
      cursor:pointer; -webkit-appearance:none;
    }
    .vol-value { font-weight:600; color:var(--accent2); font-size:0.85rem; min-width:40px; text-align:right; }
    .stop-btn {
      background:#00796b; border:none; color:white; font-weight:600;
      font-size:0.85rem; padding:8px 16px; border-radius:25px;
      display:flex; align-items:center; gap:5px; cursor:pointer;
      transition:0.2s; white-space:nowrap;
    }
    .stop-btn svg { width:16px; height:16px; stroke-width:2.5; }
    .stop-btn:active { background:#004d40; transform:scale(0.96); }

    .sound-grid {
      flex:1; overflow-y:auto; display:grid;
      grid-template-columns: repeat(auto-fill, minmax(140px,1fr));
      gap:var(--gap); padding:12px; align-content:start;
    }
    .sound-card {
      background:var(--surface); backdrop-filter:blur(20px);
      border-radius:var(--radius); padding:14px 8px;
      display:flex; flex-direction:column; align-items:center; gap:10px;
      border:1px solid var(--border-glass); transition:0.2s;
      animation: fadeInUp 0.3s ease;
    }
    @keyframes fadeInUp { from { opacity:0; transform:translateY(15px); } }
    .play-btn {
      width:50px; height:50px; border-radius:50%;
      background: radial-gradient(circle at 30% 30%, var(--accent2), #9c27b0);
      border:none; color:white; display:flex; align-items:center;
      justify-content:center; cursor:pointer;
      box-shadow: 0 4px 14px rgba(213,0,249,0.35); transition:0.15s;
    }
    .play-btn svg { width:22px; height:22px; fill:white; stroke:none; }
    .play-btn:active { transform:scale(0.92); box-shadow:0 0 20px var(--accent2); }
    .sound-name {
      font-size:0.8rem; font-weight:500; color:var(--text);
      text-align:center; word-break:break-word; line-height:1.2;
    }
    .card-actions { display:flex; gap:8px; margin-top:2px; }
    .action-btn {
      background:none; border:none; color:var(--text-secondary);
      cursor:pointer; padding:4px; border-radius:50%;
      display:flex; transition:0.2s;
    }
    .action-btn svg { width:16px; height:16px; stroke-width:2; }
    .action-btn.rename:hover { color:var(--accent); }
    .action-btn.delete:hover { color:var(--danger); }

    .bottom-bar {
      display:flex; justify-content:center; gap:14px;
      padding:12px; background:rgba(0,0,0,0.4);
      backdrop-filter:blur(15px); flex-shrink:0;
    }
    .fab {
      width:50px; height:50px; border-radius:50%; border:none;
      display:flex; align-items:center; justify-content:center;
      cursor:pointer; transition:0.2s; box-shadow:0 6px 16px rgba(0,0,0,0.3);
    }
    .fab svg { width:24px; height:24px; stroke-width:2.5; }
    .fab.add { background:linear-gradient(135deg, var(--accent), #00b8d4); color:#000; }
    .fab:active { transform:scale(0.93); }

    /* Admin panel */
    .admin-overlay {
      position:fixed; top:0; left:0; right:0; bottom:0;
      background:rgba(0,0,0,0.8); backdrop-filter:blur(10px);
      z-index:200; display:flex; align-items:center; justify-content:center;
    }
    .admin-box {
      background:#1c1b33; padding:20px; border-radius:24px;
      width:90%; max-width:400px; max-height:80vh; overflow-y:auto;
      border:1px solid var(--accent);
    }
    .admin-box h3 { color:var(--accent); margin-bottom:15px; }
    .admin-box input, .admin-box button { margin:5px 0; }
    .admin-file { color:white; }
    .admin-list { max-height:200px; overflow-y:auto; margin:10px 0; }
    .admin-item { display:flex; align-items:center; justify-content:space-between; padding:6px 0; border-bottom:1px solid #333; }
    .admin-item span { color:var(--text); font-size:0.85rem; }
    .admin-item button { margin-left:8px; background:none; border:none; color:var(--danger); cursor:pointer; }
    .btn-primary { background:var(--accent); color:#000; border:none; padding:10px 20px; border-radius:20px; font-weight:600; }
    .btn-outline { background:transparent; border:1px solid var(--accent); color:var(--accent); padding:8px 16px; border-radius:20px; }
    .close-admin { float:right; color:var(--text); background:none; border:none; font-size:1.2rem; cursor:pointer; }
  </style>
</head>
<body>
<div class="stars" id="stars"></div>

<div class="app">
  <div class="header">
    <div class="logo"><i data-lucide="music"></i> VoiceMod Pro</div>
    <div class="header-btns">
    <button class="icon-btn" id="adminBtn" title="Admin"><i data-lucide="settings-2"></i></button>
    </div>
  </div>

  <div class="tab-bar">
    <button class="tab-btn active" id="libTabBtn">Library</button>
    <button class="tab-btn" id="myTabBtn">My Sounds</button>
  </div>

  <div class="search-wrap">
    <input type="text" class="search-input" id="searchInput" placeholder="Search sounds..." autocomplete="off">
  </div>

  <div class="controls">
    <i data-lucide="volume-2" class="vol-icon" style="width:20px;height:20px;stroke-width:2;"></i>
    <input type="range" id="volSlider" min="0" max="100" value="80" class="vol-slider">
    <span id="volValue" class="vol-value">80%</span>
    <button id="stopBtn" class="stop-btn"><i data-lucide="square"></i> Stop</button>
  </div>

  <div id="soundGrid" class="sound-grid"></div>

  <div class="bottom-bar" id="bottomBar" style="display:flex;">
    <button id="addBtn" class="fab add"><i data-lucide="plus"></i></button>
  </div>
</div>

<!-- Hidden file input -->
<input type="file" id="fileInput" accept="audio/*" style="display:none" multiple>

<!-- Admin panel overlay (hidden) -->
<div id="adminOverlay" class="admin-overlay" style="display:none;">
  <div class="admin-box">
    <button class="close-admin" id="closeAdmin">&times;</button>
    <h3>Admin Panel</h3>
    <div id="adminContent"></div>
  </div>
</div>

<script>
  lucide.createIcons();

  // IndexedDB for user sounds
  let db;
  const request = indexedDB.open('soundboard_user', 1);
  request.onupgradeneeded = e => {
    const d = e.target.result;
    if (!d.objectStoreNames.contains('sounds')) {
      d.createObjectStore('sounds', { keyPath: 'id', autoIncrement: true });
    }
  };
  request.onsuccess = e => { db = e.target.result; loadUserSounds(); };
  request.onerror = () => console.warn('IndexedDB unavailable');

  // DOM elements
  const grid = document.getElementById('soundGrid');
  const volSlider = document.getElementById('volSlider');
  const volValue = document.getElementById('volValue');
  const searchInput = document.getElementById('searchInput');
  const addBtn = document.getElementById('addBtn');
  const stopBtn = document.getElementById('stopBtn');
  const fileInput = document.getElementById('fileInput');
  const libTabBtn = document.getElementById('libTabBtn');
  const myTabBtn = document.getElementById('myTabBtn');
  const bottomBar = document.getElementById('bottomBar');
  const adminBtn = document.getElementById('adminBtn');
  const adminOverlay = document.getElementById('adminOverlay');
  const closeAdmin = document.getElementById('closeAdmin');
  const adminContent = document.getElementById('adminContent');

  // State
  let librarySounds = [];
  let userSounds = [];
  let currentTab = 'library';
  let currentAudio = null;
  const ADMIN_PASSWORD = 'RASHID707';

  // Volume
  volSlider.addEventListener('input', () => {
    volValue.textContent = volSlider.value + '%';
    if (currentAudio) currentAudio.volume = volSlider.value / 100;
  });

  // Stop
  stopBtn.addEventListener('click', () => {
    if (currentAudio) { currentAudio.pause(); currentAudio = null; }
  });

  // Add user sound
  addBtn.addEventListener('click', () => fileInput.click());
  fileInput.addEventListener('change', handleUserUpload);
  function handleUserUpload(e) {
    const files = e.target.files;
    if (!files.length) return;
    Array.from(files).forEach(file => {
      const reader = new FileReader();
      reader.onload = ev => {
        const name = file.name.replace(/\.[^/.]+$/, "").substring(0,30);
        addUserSound(name, ev.target.result);
      };
      reader.readAsDataURL(file);
    });
    fileInput.value = '';
  }
  function addUserSound(name, dataUrl) {
    const tx = db.transaction('sounds', 'readwrite');
    tx.objectStore('sounds').add({ name, dataUrl });
    tx.oncomplete = () => loadUserSounds();
  }
  function loadUserSounds() {
    const tx = db.transaction('sounds', 'readonly');
    const req = tx.objectStore('sounds').getAll();
    req.onsuccess = () => {
      userSounds = req.result || [];
      if (currentTab === 'my') renderSounds();
    };
  }

  // Load library from API
  async function loadLibrary() {
    try {
      const res = await fetch('/api/sounds');
      if (!res.ok) throw new Error('Failed');
      librarySounds = await res.json();
    } catch (err) {
      console.warn('Library load failed');
      librarySounds = [];
    }
    if (currentTab === 'library') renderSounds();
  }

  function renderSounds() {
    const query = searchInput.value.toLowerCase();
    let sounds = currentTab === 'library' ? librarySounds : userSounds;
    const filtered = sounds.filter(s => s.name.toLowerCase().includes(query));
    grid.innerHTML = '';
    if (!filtered.length) {
      grid.innerHTML = `<div style="grid-column:1/-1; text-align:center; color:#666; padding:30px;">${currentTab === 'library' ? 'Library is empty.' : 'No sounds yet. Tap + to add.'}</div>`;
      return;
    }
    filtered.forEach(sound => {
      const card = document.createElement('div');
      card.className = 'sound-card';
      card.innerHTML = `
        <button class="play-btn"><i data-lucide="play" style="width:20px;height:20px;"></i></button>
        <div class="sound-name">${escapeHtml(sound.name)}</div>
        <div class="card-actions">
          ${currentTab === 'my' ? `
            <button class="action-btn rename" title="Rename"><i data-lucide="pencil"></i></button>
            <button class="action-btn delete" title="Delete"><i data-lucide="trash-2"></i></button>
          ` : ''}
        </div>
      `;
      lucide.createIcons(card);

      card.querySelector('.play-btn').addEventListener('click', (e) => {
        e.stopPropagation();
        playSound(sound);
      });

      if (currentTab === 'my') {
        card.querySelector('.action-btn.rename').addEventListener('click', (e) => {
          e.stopPropagation();
          renameUserSound(sound.id, sound.name);
        });
        card.querySelector('.action-btn.delete').addEventListener('click', (e) => {
          e.stopPropagation();
          deleteUserSound(sound.id);
        });
      }
      grid.appendChild(card);
    });
  }

  function playSound(sound) {
    if (currentAudio) { currentAudio.pause(); currentAudio = null; }
    let src;
    if (currentTab === 'library') {
      src = `/api/play/${sound.file}`;
    } else {
      src = sound.dataUrl;
    }
    const audio = new Audio(src);
    audio.volume = volSlider.value / 100;
    audio.play().catch(() => {});
    currentAudio = audio;
  }

  function deleteUserSound(id) {
    const tx = db.transaction('sounds', 'readwrite');
    tx.objectStore('sounds').delete(id);
    tx.oncomplete = () => {
      if (currentAudio) { currentAudio.pause(); currentAudio = null; }
      loadUserSounds();
    };
  }

  function renameUserSound(id, oldName) {
    const newName = prompt('Enter new name:', oldName);
    if (newName && newName.trim() !== '') {
      const tx = db.transaction('sounds', 'readwrite');
      const store = tx.objectStore('sounds');
      const getReq = store.get(id);
      getReq.onsuccess = () => {
        const data = getReq.result;
        data.name = newName.trim();
        store.put(data);
      };
      tx.oncomplete = () => loadUserSounds();
    }
  }

  // Tab switching
  libTabBtn.addEventListener('click', () => {
    currentTab = 'library';
    libTabBtn.classList.add('active');
    myTabBtn.classList.remove('active');
    bottomBar.style.display = 'none';
    renderSounds();
  });
  myTabBtn.addEventListener('click', () => {
    currentTab = 'my';
    myTabBtn.classList.add('active');
    libTabBtn.classList.remove('active');
    bottomBar.style.display = 'flex';
    renderSounds();
  });

  searchInput.addEventListener('input', renderSounds);

  // --- Admin Panel ---
  adminBtn.addEventListener('click', async () => {
    const pw = prompt('Enter admin password:');
    if (pw !== ADMIN_PASSWORD) {
      alert('Wrong password!');
      return;
    }
    showAdminPanel();
  });

  closeAdmin.addEventListener('click', () => {
    adminOverlay.style.display = 'none';
  });

  async function showAdminPanel() {
    adminOverlay.style.display = 'flex';
    await refreshAdminList();
  }

  async function refreshAdminList() {
    const sounds = await (await fetch('/api/sounds')).json();
    let html = `
      <div class="admin-list">
        ${sounds.map(s => `
          <div class="admin-item">
            <span>${escapeHtml(s.name)}</span>
            <span style="color:#666; font-size:0.7rem;">${s.file}</span>
            <button onclick="adminRename('${s.file}', '${escapeHtml(s.name)}')"><i data-lucide="pencil"></i></button>
            <button onclick="adminDelete('${s.file}')"><i data-lucide="trash-2"></i></button>
          </div>
        `).join('')}
        ${sounds.length === 0 ? '<div style="color:#666;">Library empty</div>' : ''}
      </div>
      <div style="margin-top:10px;">
        <input type="file" id="adminFileInput" accept="audio/*" style="color:white;" class="admin-file">
        <input type="text" id="adminFileName" placeholder="Sound name" style="width:100%;padding:8px;background:#121024;color:white;border:1px solid #444;border-radius:10px;">
        <button onclick="adminUpload()" class="btn-primary" style="margin-top:5px;">Upload to Library</button>
      </div>
    `;
    adminContent.innerHTML = html;
    lucide.createIcons(adminContent);
  }

  window.adminRename = async function(filename, oldName) {
    const newName = prompt('Enter new name:', oldName);
    if (!newName) return;
    const res = await fetch('/admin/rename', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password: ADMIN_PASSWORD, file: filename, name: newName })
    });
    if (res.ok) {
      await loadLibrary();
      await refreshAdminList();
    } else {
      alert('Rename failed');
    }
  };

  window.adminDelete = async function(filename) {
    if (!confirm('Delete this sound?')) return;
    const res = await fetch(`/admin/delete/${filename}?password=${ADMIN_PASSWORD}`, { method: 'DELETE' });
    if (res.ok) {
      await loadLibrary();
      await refreshAdminList();
    } else {
      alert('Delete failed');
    }
  };

  window.adminUpload = async function() {
    const fileInput = document.getElementById('adminFileInput');
    const nameInput = document.getElementById('adminFileName');
    const file = fileInput.files[0];
    if (!file) {
      alert('Select a file');
      return;
    }
    const formData = new FormData();
    formData.append('file', file);
    formData.append('name', nameInput.value || file.name.replace(/\.[^/.]+$/, ''));
    formData.append('password', ADMIN_PASSWORD);
    const res = await fetch('/admin/upload', { method: 'POST', body: formData });
    if (res.ok) {
      await loadLibrary();
      await refreshAdminList();
      fileInput.value = '';
      nameInput.value = '';
    } else {
      alert('Upload failed');
    }
  };

  function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
  }

  // Animated stars
  (function createStars() {
    const container = document.getElementById('stars');
    for (let i = 0; i < 60; i++) {
      const star = document.createElement('div');
      star.className = 'star';
      const size = Math.random() * 3 + 1;
      star.style.width = size + 'px';
      star.style.height = size + 'px';
      star.style.left = Math.random() * 100 + '%';
      star.style.top = Math.random() * 100 + '%';
      star.style.animationDelay = Math.random() * 5 + 's';
      star.style.animationDuration = (Math.random() * 3 + 2) + 's';
      container.appendChild(star);
    }
  })();

  // Init
  loadLibrary();
  loadUserSounds();
</script>
</body>
</html>
