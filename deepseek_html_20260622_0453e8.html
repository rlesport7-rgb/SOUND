<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>VoiceMod Pro</title>
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    :root {
      --bg: #0a0a14;
      --surface: rgba(25, 22, 48, 0.85);
      --accent: #00e5ff;
      --accent2: #d500f9;
      --danger: #ff5252;
      --text: #f0f0ff;
      --text-secondary: #b0b0d0;
      --border-glass: rgba(255, 255, 255, 0.08);
      --radius: 18px;
      --gap: 10px;
    }
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      height: 100vh;
      height: 100dvh;
      overflow: hidden;
      user-select: none;
      display: flex;
      flex-direction: column;
      position: relative;
    }
    /* Animated stars background */
    .stars {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
      background: radial-gradient(ellipse at 30% 20%, rgba(213, 0, 249, 0.07) 0%, transparent 50%),
                  radial-gradient(ellipse at 80% 80%, rgba(0, 229, 255, 0.05) 0%, transparent 50%);
    }
    .star {
      position: absolute;
      background: white;
      border-radius: 50%;
      animation: twinkle 4s infinite alternate;
      opacity: 0;
    }
    @keyframes twinkle {
      0% { opacity: 0.1; transform: scale(0.5); }
      100% { opacity: 0.8; transform: scale(1); }
    }

    /* Main layout */
    .app {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      height: 100%;
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      background: var(--surface);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border-glass);
      flex-shrink: 0;
    }
    .logo {
      font-size: 1.3rem;
      font-weight: 700;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .header-actions {
      display: flex;
      gap: 8px;
    }
    .icon-btn {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid var(--border-glass);
      color: var(--accent);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: 0.2s;
      backdrop-filter: blur(10px);
    }
    .icon-btn.active {
      background: var(--accent);
      color: #000;
      border-color: var(--accent);
    }
    .icon-btn svg {
      width: 18px;
      height: 18px;
      stroke-width: 2;
    }

    /* Search */
    .search-wrap {
      padding: 10px 16px;
      background: rgba(0, 0, 0, 0.3);
      flex-shrink: 0;
    }
    .search-input {
      width: 100%;
      padding: 12px 16px;
      border-radius: 30px;
      border: 1px solid var(--border-glass);
      background: rgba(255, 255, 255, 0.06);
      color: var(--text);
      font-size: 0.9rem;
      outline: none;
      transition: 0.2s;
    }
    .search-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 15px rgba(0, 229, 255, 0.2);
    }

    /* Controls */
    .controls {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 16px;
      background: rgba(10, 9, 28, 0.5);
      flex-shrink: 0;
    }
    .vol-icon {
      color: var(--accent2);
    }
    .vol-slider {
      flex: 1;
      accent-color: var(--accent2);
      height: 4px;
      background: rgba(255, 255, 255, 0.15);
      border-radius: 4px;
    }
    .vol-slider::-webkit-slider-thumb {
      width: 18px;
      height: 18px;
      background: var(--accent2);
      border-radius: 50%;
      box-shadow: 0 0 10px var(--accent2);
      cursor: pointer;
      -webkit-appearance: none;
    }
    .vol-value {
      font-weight: 600;
      color: var(--accent2);
      font-size: 0.85rem;
      min-width: 40px;
      text-align: right;
    }
    .stop-btn {
      background: #00796b;
      border: none;
      color: white;
      font-weight: 600;
      font-size: 0.85rem;
      padding: 8px 16px;
      border-radius: 25px;
      display: flex;
      align-items: center;
      gap: 5px;
      cursor: pointer;
      transition: 0.2s;
      white-space: nowrap;
    }
    .stop-btn svg {
      width: 16px;
      height: 16px;
      stroke-width: 2.5;
    }
    .stop-btn:active {
      background: #004d40;
      transform: scale(0.96);
    }

    /* Sound grid */
    .sound-grid {
      flex: 1;
      overflow-y: auto;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: var(--gap);
      padding: 12px;
      align-content: start;
    }
    .sound-card {
      background: var(--surface);
      backdrop-filter: blur(20px);
      border-radius: var(--radius);
      padding: 14px 8px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      border: 1px solid var(--border-glass);
      transition: 0.2s;
      animation: fadeInUp 0.3s ease;
    }
    .sound-card.selected {
      border-color: var(--accent);
      box-shadow: 0 0 15px rgba(0, 229, 255, 0.3);
    }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(15px); }
    }
    .play-btn {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, var(--accent2), #9c27b0);
      border: none;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-shadow: 0 4px 14px rgba(213, 0, 249, 0.35);
      transition: 0.15s;
    }
    .play-btn svg {
      width: 22px;
      height: 22px;
      fill: white;
      stroke: none;
    }
    .play-btn:active {
      transform: scale(0.92);
      box-shadow: 0 0 20px var(--accent2);
    }
    .sound-name {
      font-size: 0.8rem;
      font-weight: 500;
      color: var(--text);
      text-align: center;
      word-break: break-word;
      line-height: 1.2;
      max-width: 100%;
    }
    .card-actions {
      display: flex;
      gap: 8px;
      margin-top: 2px;
    }
    .action-btn {
      background: none;
      border: none;
      color: var(--text-secondary);
      cursor: pointer;
      padding: 4px;
      border-radius: 50%;
      display: flex;
      transition: 0.2s;
    }
    .action-btn svg {
      width: 16px;
      height: 16px;
      stroke-width: 2;
    }
    .action-btn.rename:hover {
      color: var(--accent);
    }
    .action-btn.delete:hover {
      color: var(--danger);
    }

    /* Bottom bar */
    .bottom-bar {
      display: flex;
      justify-content: center;
      gap: 14px;
      padding: 12px;
      background: rgba(0, 0, 0, 0.4);
      backdrop-filter: blur(15px);
      flex-shrink: 0;
    }
    .fab {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      border: none;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: 0.2s;
      box-shadow: 0 6px 16px rgba(0,0,0,0.3);
    }
    .fab svg {
      width: 24px;
      height: 24px;
      stroke-width: 2.5;
    }
    .fab.add {
      background: linear-gradient(135deg, var(--accent), #00b8d4);
      color: #000;
    }
    .fab.delete-sel {
      background: var(--danger);
      color: white;
      display: none;
    }
    .fab:active {
      transform: scale(0.93);
    }

    /* Dialog */
    .dialog-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(4px);
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .dialog-box {
      background: #1c1b33;
      padding: 20px;
      border-radius: 24px;
      width: 85%;
      border: 1px solid var(--accent);
    }
    .dialog-box h3 {
      margin-bottom: 12px;
      color: var(--accent);
      font-size: 1.1rem;
    }
    .dialog-box input {
      width: 100%;
      padding: 12px;
      margin-bottom: 16px;
      background: #121024;
      border: 1px solid #444;
      border-radius: 14px;
      color: white;
      font-size: 1rem;
      outline: none;
    }
    .dialog-btns {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
    }
    .dialog-btns button {
      padding: 8px 20px;
      border-radius: 20px;
      border: none;
      font-weight: 600;
      cursor: pointer;
    }
    .btn-cancel {
      background: #3a3a5a;
      color: white;
    }
    .btn-save {
      background: var(--accent2);
      color: white;
    }
  </style>
</head>
<body>
<div class="stars" id="stars"></div>

<div class="app">
  <!-- Header -->
  <div class="header">
    <div class="logo">
      <i data-lucide="music" style="width:22px;height:22px;stroke-width:2.5;"></i> VoiceMod Pro
    </div>
    <div class="header-actions">
      <button class="icon-btn" id="selectBtn" title="Select mode">
        <i data-lucide="check-square"></i>
      </button>
    </div>
  </div>

  <!-- Search -->
  <div class="search-wrap">
    <input type="text" class="search-input" id="searchInput" placeholder="Search sounds..." autocomplete="off">
  </div>

  <!-- Volume & Stop -->
  <div class="controls">
    <i data-lucide="volume-2" class="vol-icon" style="width:20px;height:20px;stroke-width:2;"></i>
    <input type="range" id="volSlider" min="0" max="100" value="80" class="vol-slider">
    <span id="volValue" class="vol-value">80%</span>
    <button id="stopBtn" class="stop-btn">
      <i data-lucide="square"></i> Stop
    </button>
  </div>

  <!-- Sound grid -->
  <div id="soundGrid" class="sound-grid"></div>

  <!-- Bottom buttons -->
  <div class="bottom-bar">
    <button id="addBtn" class="fab add">
      <i data-lucide="plus"></i>
    </button>
    <button id="deleteSelBtn" class="fab delete-sel">
      <i data-lucide="trash-2"></i>
    </button>
  </div>
</div>

<!-- Hidden file input -->
<input type="file" id="fileInput" accept="audio/*" style="display:none" multiple>

<!-- Rename dialog -->
<div id="renameDialog" class="dialog-overlay" style="display:none;">
  <div class="dialog-box">
    <h3>Rename Sound</h3>
    <input type="text" id="renameInput" maxlength="30" placeholder="Enter new name">
    <div class="dialog-btns">
      <button id="renameCancel" class="btn-cancel">Cancel</button>
      <button id="renameSave" class="btn-save">Save</button>
    </div>
  </div>
</div>

<script>
  // Initialize Lucide icons
  lucide.createIcons();

  // ---------- IndexedDB ----------
  let db;
  const request = indexedDB.open('soundboard_db', 1);
  request.onupgradeneeded = e => {
    const d = e.target.result;
    if (!d.objectStoreNames.contains('sounds')) {
      d.createObjectStore('sounds', { keyPath: 'id', autoIncrement: true });
    }
  };
  request.onsuccess = e => { db = e.target.result; loadSounds(); };
  request.onerror = () => console.warn('IndexedDB unavailable');

  // ---------- DOM elements ----------
  const grid = document.getElementById('soundGrid');
  const volSlider = document.getElementById('volSlider');
  const volValue = document.getElementById('volValue');
  const searchInput = document.getElementById('searchInput');
  const addBtn = document.getElementById('addBtn');
  const stopBtn = document.getElementById('stopBtn');
  const selectBtn = document.getElementById('selectBtn');
  const deleteSelBtn = document.getElementById('deleteSelBtn');
  const fileInput = document.getElementById('fileInput');
  const renameDialog = document.getElementById('renameDialog');
  const renameInput = document.getElementById('renameInput');
  const renameSave = document.getElementById('renameSave');
  const renameCancel = document.getElementById('renameCancel');

  // ---------- State ----------
  let allSounds = [];
  let currentAudio = null;
  let selectionMode = false;
  let selectedIds = new Set();
  let currentRenameId = null;

  // ---------- Volume ----------
  volSlider.addEventListener('input', () => {
    volValue.textContent = volSlider.value + '%';
    if (currentAudio) currentAudio.volume = volSlider.value / 100;
  });

  // ---------- Stop ----------
  stopBtn.addEventListener('click', () => {
    if (currentAudio) {
      currentAudio.pause();
      currentAudio = null;
    }
  });

  // ---------- Add sounds ----------
  addBtn.addEventListener('click', () => fileInput.click());
  fileInput.addEventListener('change', handleFiles);

  function handleFiles(e) {
    const files = e.target.files;
    if (!files.length) return;
    Array.from(files).forEach(file => {
      const reader = new FileReader();
      reader.onload = ev => {
        const name = file.name.replace(/\.[^/.]+$/, "").substring(0, 30);
        addSoundToDB(name, ev.target.result);
      };
      reader.readAsDataURL(file);
    });
    fileInput.value = '';
  }

  function addSoundToDB(name, dataUrl) {
    const tx = db.transaction('sounds', 'readwrite');
    tx.objectStore('sounds').add({ name, dataUrl });
    tx.oncomplete = () => loadSounds();
  }

  // ---------- Load & render ----------
  function loadSounds() {
    const tx = db.transaction('sounds', 'readonly');
    const req = tx.objectStore('sounds').getAll();
    req.onsuccess = () => {
      allSounds = req.result || [];
      renderSounds(allSounds);
    };
  }

  function renderSounds(sounds) {
    grid.innerHTML = '';
    if (!sounds.length) {
      grid.innerHTML = `<div style="grid-column:1/-1; text-align:center; color:#666; padding:30px;">No sounds yet. Tap + to add</div>`;
      return;
    }
    sounds.forEach(sound => {
      const card = document.createElement('div');
      card.className = 'sound-card';
      if (selectionMode && selectedIds.has(sound.id)) card.classList.add('selected');
      card.innerHTML = `
        <button class="play-btn"><i data-lucide="play" style="width:20px;height:20px;"></i></button>
        <div class="sound-name">${escapeHtml(sound.name)}</div>
        <div class="card-actions">
          <button class="action-btn rename" title="Rename"><i data-lucide="pencil"></i></button>
          <button class="action-btn delete" title="Delete"><i data-lucide="trash-2"></i></button>
        </div>
      `;
      lucide.createIcons(card); // render icons inside card

      // Play
      card.querySelector('.play-btn').addEventListener('click', (e) => {
        e.stopPropagation();
        playSound(sound.dataUrl);
      });
      // Rename
      card.querySelector('.action-btn.rename').addEventListener('click', (e) => {
        e.stopPropagation();
        openRename(sound.id, sound.name);
      });
      // Delete / select
      const delBtn = card.querySelector('.action-btn.delete');
      delBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        if (!selectionMode) {
          deleteSingle(sound.id);
        } else {
          toggleSelection(sound.id, card);
        }
      });

      // Long-press for selection mode
      let longPress;
      card.addEventListener('touchstart', (e) => {
        longPress = setTimeout(() => {
          if (!selectionMode) enterSelectionMode();
          toggleSelection(sound.id, card);
        }, 500);
      }, {passive: true});
      card.addEventListener('touchend', () => clearTimeout(longPress));
      card.addEventListener('touchmove', () => clearTimeout(longPress));
      card.addEventListener('click', () => {
        if (selectionMode) toggleSelection(sound.id, card);
      });

      grid.appendChild(card);
    });
  }

  function playSound(dataUrl) {
    if (currentAudio) {
      currentAudio.pause();
      currentAudio = null;
    }
    currentAudio = new Audio(dataUrl);
    currentAudio.volume = volSlider.value / 100;
    currentAudio.play().catch(() => {});
  }

  function deleteSingle(id) {
    const tx = db.transaction('sounds', 'readwrite');
    tx.objectStore('sounds').delete(id);
    tx.oncomplete = () => {
      if (currentAudio) { currentAudio.pause(); currentAudio = null; }
      loadSounds();
    };
  }

  // ---------- Rename ----------
  function openRename(id, name) {
    currentRenameId = id;
    renameInput.value = name;
    renameDialog.style.display = 'flex';
    renameInput.focus();
  }

  renameCancel.addEventListener('click', () => {
    renameDialog.style.display = 'none';
    currentRenameId = null;
  });

  renameSave.addEventListener('click', () => {
    const newName = renameInput.value.trim();
    if (newName && currentRenameId !== null) {
      const tx = db.transaction('sounds', 'readwrite');
      const store = tx.objectStore('sounds');
      const getReq = store.get(currentRenameId);
      getReq.onsuccess = () => {
        const data = getReq.result;
        data.name = newName;
        store.put(data);
      };
      tx.oncomplete = () => loadSounds();
    }
    renameDialog.style.display = 'none';
    currentRenameId = null;
  });

  // ---------- Search ----------
  searchInput.addEventListener('input', () => {
    const q = searchInput.value.toLowerCase();
    renderSounds(allSounds.filter(s => s.name.toLowerCase().includes(q)));
  });

  // ---------- Selection mode ----------
  function enterSelectionMode() {
    selectionMode = true;
    selectBtn.classList.add('active');
    deleteSelBtn.style.display = 'flex';
  }

  function exitSelectionMode() {
    selectionMode = false;
    selectedIds.clear();
    selectBtn.classList.remove('active');
    deleteSelBtn.style.display = 'none';
    renderSounds(allSounds);
  }

  selectBtn.addEventListener('click', () => {
    selectionMode ? exitSelectionMode() : enterSelectionMode();
  });

  function toggleSelection(id, card) {
    if (selectedIds.has(id)) {
      selectedIds.delete(id);
      card.classList.remove('selected');
    } else {
      selectedIds.add(id);
      card.classList.add('selected');
    }
    if (selectedIds.size === 0) exitSelectionMode();
  }

  deleteSelBtn.addEventListener('click', () => {
    if (selectedIds.size === 0) return;
    if (confirm(`Delete ${selectedIds.size} selected sounds?`)) {
      const tx = db.transaction('sounds', 'readwrite');
      selectedIds.forEach(id => tx.objectStore('sounds').delete(id));
      tx.oncomplete = () => {
        if (currentAudio) { currentAudio.pause(); currentAudio = null; }
        selectedIds.clear();
        exitSelectionMode();
        loadSounds();
      };
    }
  });

  // ---------- Helpers ----------
  function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
  }

  // ---------- Animated stars ----------
  (function createStars() {
    const container = document.getElementById('stars');
    for (let i = 0; i < 60; i++) {
      const star = document.createElement('div');
      star.className = 'star';
      const size = Math.random() * 3 + 1;
      star.style.width = size + 'px';
      star.style.height = size + 'px';
      star.style.left = Math.random() * 100 + '%';
      star.style.top = Math.random() * 100 + '%';
      star.style.animationDelay = Math.random() * 5 + 's';
      star.style.animationDuration = (Math.random() * 3 + 2) + 's';
      container.appendChild(star);
    }
  })();
</script>
</body>
</html>
